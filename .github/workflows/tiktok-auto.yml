name: إنشاء فيديو تيك توك

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: تثبيت كل شيء بطريقة مختلفة
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo apt-get install -y python3-pip
          
          # تثبيت setuptools عبر apt (طريقة نظامية)
          sudo apt-get install -y python3-setuptools
          
          # ترقية pip
          python3 -m pip install --upgrade pip
          
          # تثبيت المكتبات
          python3 -m pip install moviepy gtts numpy
      
      - name: تشغيل الفيديو
        run: python3 create_video.py
      
      - name: رفع الفيديو
        uses: actions/upload-artifact@v4
        with:
          name: فيديو
          path: "*.mp4"
