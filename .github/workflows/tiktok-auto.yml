name: إنشاء فيديو تيك توك تلقائي

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: استنساخ المشروع
        uses: actions/checkout@v4
      
      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'  # إصدار مستقر
      
      - name: تنظيف cache pip
        run: |
          python -m pip cache purge
          rm -rf ~/.cache/pip
      
      - name: تحديث pip والأدوات الأساسية
        run: |
          python -m pip install --upgrade pip setuptools wheel
      
      - name: تثبيت المكتبات (طريقة بديلة)
        run: |
          python -m pip install --no-cache-dir imageio==2.31.1
          python -m pip install --no-cache-dir imageio-ffmpeg==0.4.8
          python -m pip install --no-cache-dir numpy==1.23.5
          python -m pip install --no-cache-dir decorator==4.4.2
          python -m pip install --no-cache-dir tqdm==4.64.1
          python -m pip install --no-cache-dir gtts==2.3.2
          python -m pip install --no-cache-dir moviepy==1.0.3
      
      - name: تثبيت ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: التحقق من تثبيت المكتبات
        run: |
          python -c "import moviepy.editor; print('✅ moviepy مثبتة')"
          python -c "from gtts import gTTS; print('✅ gtts مثبتة')"
          python -c "import numpy; print('✅ numpy مثبتة')"
      
      - name: إنشاء الفيديو
        run: |
          python create_video.py
      
      - name: رفع الفيديو
        uses: actions/upload-artifact@v4
        with:
          name: فيديو-تيك-توك
          path: "*.mp4"
