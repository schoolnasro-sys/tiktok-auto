name: إنشاء فيديو تيك توك تلقائي

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: استنساخ المشروع
        uses: actions/checkout@v4
      
      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: تثبيت المكتبات
        run: |
          pip install moviepy gtts numpy
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: الدخول إلى المجلد وإنشاء الفيديو
        run: |
          cd tiktok-auto
          python create_video.py
      
      - name: رفع الفيديو
        uses: actions/upload-artifact@v4
        with:
          name: فيديو-تيك-توك
          path: "tiktok-auto/*.mp4"
